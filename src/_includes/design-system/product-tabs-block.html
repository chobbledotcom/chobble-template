{%- comment -%}
Product-tabs block - renders the product's `tabs` array as a tabbed
content section. Renders nothing when there are no tabs.

Product-only block. No block-level parameters.
{%- endcomment -%}

{%- if tabs.size > 0 -%}
<section class="compact" id="tabs">
  <div class="container">
    {%- include "tabs-inner.html" -%}
  </div>
</section>
{%- endif -%}
