{%- comment -%}
Tabs block - renders the page's `tabs` array as a tabbed content section.
Renders nothing when there are no tabs.

No block-level parameters. Reads `tabs` from the page data.
{%- endcomment -%}

{%- if tabs.size > 0 -%}
<section class="compact" id="tabs">
  <div class="container">
    {%- include "tabs-inner.html" -%}
  </div>
</section>
{%- endif -%}
