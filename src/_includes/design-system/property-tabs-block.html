{%- comment -%}
Property-tabs block - renders the property's `tabs` array as a tabbed
content section. Renders nothing when there are no tabs.

Property-only block. No block-level parameters.
{%- endcomment -%}

{%- if tabs.size > 0 -%}
<section class="compact">
  <div class="container">
    <div class="property-tabs" id="tabs">
      {%- include "tabs-inner.html" -%}
    </div>
  </div>
</section>
{%- endif -%}
