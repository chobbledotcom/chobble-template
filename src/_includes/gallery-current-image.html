<div class="current-image">
  {% assign image = gallery[0] %}
  {%- capture alt_text -%}{%- include "get-alt-text.html" -%}{%- endcapture -%}
  <a
    href="{{ image | normalizeImageUrl }}"
    class="current-image-link"
    data-popup-trigger
    data-index="1"
    aria-label="Open image gallery"
  >
    {% image image, alt_text %}
  </a>
</div>
